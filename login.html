<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpyraZ | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#07080d;--card:#0f1118;--border:rgba(255,255,255,0.06);--orange:#ff8c00;--text:#f1f5f9;--muted:#64748b;--green:#00cc88;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);background-size:28px 28px;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}

/* BRAND TOP */
.brand{text-align:center;margin-bottom:2rem;}
.brand h1{font-family:'Outfit',sans-serif;font-size:3rem;font-weight:900;color:white;letter-spacing:-2px;}
.brand h1 span{color:var(--orange);text-shadow:0 0 20px rgba(255,140,0,0.4);}
.brand p{color:var(--muted);font-size:0.88rem;margin-top:6px;}

/* AUTH CARD */
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:2rem 1.5rem;width:100%;max-width:420px;box-shadow:0 30px 60px rgba(0,0,0,0.5);}

/* MODE SWITCH */
.mode-switch{display:flex;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:4px;gap:4px;margin-bottom:1.5rem;}
.switch-btn{flex:1;padding:11px;border:none;background:none;color:var(--muted);font-weight:800;font-size:0.82rem;border-radius:10px;cursor:pointer;transition:0.2s;text-transform:uppercase;}
.switch-btn.active{background:var(--orange);color:#000;}

/* FIELDS */
.field{margin-bottom:1rem;}
.field label{display:block;font-size:0.72rem;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:6px;letter-spacing:0.5px;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-wrap i{position:absolute;left:14px;color:var(--muted);font-size:0.9rem;pointer-events:none;}
.input-wrap input{width:100%;background:rgba(0,0,0,0.4);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px 13px 42px;color:var(--text);font-size:0.92rem;outline:none;transition:0.2s;}
.input-wrap input:focus{border-color:var(--orange);background:rgba(255,140,0,0.03);}
.toggle-pw{position:absolute;right:14px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.9rem;padding:4px;}
.toggle-pw:hover{color:var(--text);}

/* SIGNUP EXTRAS */
#signupFields{display:none;}
.optional-tag{font-size:0.68rem;color:var(--muted);font-weight:600;margin-left:4px;}

/* SUBMIT */
.submit-btn{width:100%;padding:15px;background:var(--orange);color:#000;border:none;border-radius:14px;font-weight:900;font-size:1rem;cursor:pointer;margin-top:0.5rem;transition:0.2s;letter-spacing:0.5px;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(255,140,0,0.35);}
.submit-btn:disabled{background:#1e293b;color:var(--muted);transform:none;box-shadow:none;cursor:not-allowed;}

/* ERROR */
.error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:12px;font-size:0.85rem;color:var(--red);text-align:center;margin-top:1rem;display:none;font-weight:700;}

/* BACK LINK */
.back-link{margin-top:1.5rem;text-align:center;color:var(--muted);font-size:0.82rem;}
.back-link a{color:var(--orange);font-weight:700;text-decoration:none;}
.back-link a:hover{text-decoration:underline;}

/* INFO CHIPS */
.info-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:1.5rem;margin-bottom:0;}
.chip{background:rgba(255,140,0,0.08);border:1px solid rgba(255,140,0,0.15);color:var(--muted);padding:5px 12px;border-radius:50px;font-size:0.72rem;font-weight:700;display:flex;align-items:center;gap:5px;}
.chip i{color:var(--orange);}

@media(min-width:600px){.auth-card{padding:2.5rem;}}
</style>
</head>
<body>

<div class="brand">
  <h1>SPYRA<span>Z</span></h1>
  <p>Community Portal · Blox Fruits</p>
</div>

<div class="auth-card">
  <div class="mode-switch">
    <button class="switch-btn active" id="btnSignin" onclick="setMode('signin',this)"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    <button class="switch-btn" id="btnSignup" onclick="setMode('signup',this)"><i class="fas fa-user-plus"></i> Create ID</button>
  </div>

  <form id="authForm" onsubmit="handleSubmit(event)">
    <div class="field">
      <label>Username</label>
      <div class="input-wrap"><i class="fas fa-user"></i><input type="text" id="username" placeholder="Enter your username (any case works)" required autocomplete="username" oninput="this.value=this.value.trimStart()"></div>
    </div>

    <div id="signupFields">
      <div class="field">
        <label>Roblox ID <span style="color:var(--orange);">*</span></label>
        <div class="input-wrap"><i class="fas fa-gamepad"></i><input type="text" id="robloxId" placeholder="e.g. 8081154378" autocomplete="off"></div>
      </div>
      <div class="field">
        <label>Gmail Address <span class="optional-tag">(optional)</span></label>
        <div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="name@gmail.com" autocomplete="email"></div>
      </div>
    </div>

    <div class="field">
      <label>Password <span style="color:var(--muted);font-weight:600;font-size:0.68rem;">(min 8 characters)</span></label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="••••••••" minlength="8" required autocomplete="current-password">
        <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">LOG IN</button>
    <div class="error-box" id="errorBox"></div>
  </form>
</div>

<div class="back-link"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to SpyraZ</a></div>

<div class="info-chips">
  <div class="chip"><i class="fas fa-shield-check"></i> Secure Login</div>
  <div class="chip"><i class="fas fa-gamepad"></i> Roblox Linked</div>
  <div class="chip"><i class="fas fa-gift"></i> Free Spin on Signup</div>
</div>

<script>
(function(){var C=[['https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js','https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js','https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js'],['https://cdn.jsdelivr.net/npm/firebase@9.23.0/compat/app.min.js','https://cdn.jsdelivr.net/npm/firebase@9.23.0/compat/auth.min.js','https://cdn.jsdelivr.net/npm/firebase@9.23.0/compat/database.min.js'],['https://unpkg.com/firebase@9.23.0/compat/app.js','https://unpkg.com/firebase@9.23.0/compat/auth.js','https://unpkg.com/firebase@9.23.0/compat/database.js']];
function ls(u){return new Promise(function(r,j){var s=document.createElement('script');s.src=u;s.onload=r;s.onerror=j;document.head.appendChild(s);});}
function lc(i){if(i>=C.length)return;ls(C[i][0]).then(function(){return ls(C[i][1]);}).then(function(){return ls(C[i][2]);}).then(function(){window._fbReady=true;document.dispatchEvent(new Event('fbReady'));}).catch(function(){lc(i+1);});}lc(0);})();
</script>
<script>
var mode='signin',auth,db;

function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.switch-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('signupFields').style.display=m==='signup'?'block':'none';
  document.getElementById('submitBtn').textContent=m==='signup'?'CREATE ACCOUNT':'LOG IN';
  document.getElementById('errorBox').style.display='none';
}

function togglePw(){
  var inp=document.getElementById('password');
  var icon=document.getElementById('eyeIcon');
  inp.type=inp.type==='password'?'text':'password';
  icon.className=inp.type==='password'?'fas fa-eye':'fas fa-eye-slash';
}

function showError(msg){
  var box=document.getElementById('errorBox');box.textContent=msg;box.style.display='block';
}

async function handleSubmit(e){
  e.preventDefault();
  var username=document.getElementById('username').value.trim();
  var password=document.getElementById('password').value;
  var robloxId=document.getElementById('robloxId').value.trim();
  var emailInput=document.getElementById('email').value.trim();
  var btn=document.getElementById('submitBtn');
  var finalEmail=emailInput||(username.toLowerCase().replace(/\s+/g,'_')+'@spyraz.com');

  document.getElementById('errorBox').style.display='none';
  btn.disabled=true;btn.textContent='PROCESSING...';

  try{
    if(mode==='signup'){
      if(!robloxId){showError('Roblox ID is required to create an account.');btn.disabled=false;btn.textContent='CREATE ACCOUNT';return;}
      var res=await auth.createUserWithEmailAndPassword(finalEmail,password);
      await db.ref('users/'+res.user.uid).set({username:username,robloxId:robloxId,email:finalEmail,coils:100,freeSpins:3,createdAt:Date.now()});
      window.location.href='index.html';
    }else{
      // Try signing in — derive email from username
      var attempted=false;
      // Try direct email first, then @spyraz.com
      try{await auth.signInWithEmailAndPassword(finalEmail,password);}
      catch(e1){
        var fallback=username.toLowerCase().replace(/\s+/g,'_')+'@spyraz.com';
        await auth.signInWithEmailAndPassword(fallback,password);
      }
      window.location.href='index.html';
    }
  }catch(err){
    var msg='Something went wrong. Try again.';
    if(err.code==='auth/email-already-in-use')msg='This username is already taken.';
    else if(err.code==='auth/wrong-password'||err.code==='auth/invalid-credential'||err.code==='auth/user-not-found'||err.code==='auth/invalid-email')msg='Incorrect username or password.';
    else if(err.code==='auth/weak-password')msg='Password must be at least 8 characters.';
    showError(msg);
    btn.disabled=false;btn.textContent=mode==='signup'?'CREATE ACCOUNT':'LOG IN';
  }
}

function bootApp(){
  firebase.initializeApp({apiKey:"AIzaSyBvRRGp7Di6QK6LvbLIl8jyalkYmUkYISw",authDomain:"spyraz-4d24e.firebaseapp.com",databaseURL:"https://spyraz-4d24e-default-rtdb.firebaseio.com/",projectId:"spyraz-4d24e",storageBucket:"spyraz-4d24e.firebasestorage.app",messagingSenderId:"533558439070",appId:"1:533558439070:web:382971879027a158ad9f8f"});
  auth=firebase.auth();db=firebase.database();
  // If already logged in, go home
  auth.onAuthStateChanged(function(user){if(user)window.location.href='index.html';});
}
if(window._fbReady){bootApp();}else{document.addEventListener('fbReady',bootApp);}
</script>
</body>
</html>
